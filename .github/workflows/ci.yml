name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Setup sbt
      uses: sbt/setup-sbt@v1
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 21
    # Cross-compile the plugin for both sbt 1 (Scala 2.12) and sbt 2 (Scala 3).
    - run: sbt +compile
    # scripted publishes and runs against the sbt 1 artifact (default scalaVersion).
    - run: sbt scripted
